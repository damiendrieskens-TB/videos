<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Vidéo protégée</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background-color: #f5f5f5;
    }
    #container {
      background: #fff;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    #video-container {
      display: none; /* caché au départ */
      margin-top: 20px;
    }
    video {
      max-width: 100%;
      height: auto;
    }
  </style>
  <script>
    // Mot de passe attendu
    const CORRECT_PASSWORD = 'aonvp26';

    // Cette fonction sera appelée au chargement de la page
    function askPassword() {
      const pwd = prompt('Entrez le mot de passe pour accéder à la vidéo :');
      if (pwd === CORRECT_PASSWORD) {
        // Mot de passe OK : on affiche la vidéo et on lance la lecture
        const videoContainer = document.getElementById('video-container');
        const video = document.getElementById('video');

        videoContainer.style.display = 'block';
        // Essayer de lancer la lecture automatiquement
        if (video) {
          video.play().catch(() => {
            // Certains navigateurs bloquent l’autoplay, ce n’est pas grave,
            // l’utilisateur pourra cliquer sur "play".
          });
        }
      } else {
        // Mot de passe faux ou annulé
        document.body.innerHTML = '<h1>Accès refusé</h1><p>Mot de passe incorrect.</p>';
      }
    }
  </script>
</head>
<body onload="askPassword()">
  <div id="container">
    <h1>Accès à la vidéo</h1>
    <p>Veuillez entrer le mot de passe pour regarder la vidéo.</p>

    <div id="video-container">
      <video id="video" controls>
        <source src="c4f8a1c2e7b9d3v3.MP4" type="video/mp4">
        Votre navigateur ne supporte pas la lecture de vidéos HTML5.
      </video>
    </div>
  </div>
</body>
</html>
