<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Vidéo protégée</title>

  <!-- Affichage correct sur mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
    }
    #container {
      background: #fff;
      max-width: 800px;
      margin: 0 auto;
      padding: 16px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      min-height: 100vh;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 16px;
    }
    #video-container {
      display: none; /* caché tant que le mot de passe n’est pas bon */
    }
    video {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      background: #000;
    }

    @media (max-width: 480px) {
      #container {
        padding: 12px;
      }
      h1 {
        font-size: 1.2rem;
      }
    }
  </style>

  <script>
    const CORRECT_PASSWORD = 'aonvp26';

    function askPassword() {
      const pwd = prompt('Entrez le mot de passe pour accéder à la vidéo :');
      if (pwd === CORRECT_PASSWORD) {
        const videoContainer = document.getElementById('video-container');
        const video = document.getElementById('video');

        videoContainer.style.display = 'block';

        if (video) {
          video.play().catch(() => {
            // Sur mobile, l'autoplay peut être bloqué :
            // l'utilisateur pourra appuyer sur "play".
          });
        }
      } else {
        document.body.innerHTML =
          '<div id="container"><h1>Accès refusé</h1><p>Mot de passe incorrect.</p></div>';
      }
    }

    // Lancer la demande de mot de passe dès le chargement
    window.onload = askPassword;
  </script>
</head>
<body>
  <div id="container">
    <h1>Vidéo protégée</h1>
    <p>Veuillez entrer le mot de passe pour regarder la vidéo.</p>

    <div id="video-container">
      <video id="video" controls playsinline>
        <source src="c4f8a1c2e7b9d3v3.MP4" type="video/mp4">
        Votre navigateur ne supporte pas la lecture de vidéos HTML5.
      </video>
    </div>
  </div>
</body>
</html>
